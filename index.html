<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Sumador</title>
  </head>
  <body>
    <h1>Totalizador:</h1>
    <label>Cantidad de items: </label>
    <input type = "number" class="inp-cantItems"><br><br>
    <label>Precio del item: </label>
    <input type = "number" class="inp-priceItems"><br><br>
    <label>Estado: </label>
    <select class="select-estado">
      <option value="California">California (8.25%)</option>
      <option value="Alabama">Alabama (4%)</option>
    </select><br><br>
    <button class="btn-calcular">Totalizar</button><br><br>
    <label>Precio Neto : </label><span id="precio-neto-valor"></span><br><br>
    <label>Impuesto para : </label><span id="impuesto-valor"></span><br><br>
    <label>Precio Total (+ impuesto): </label><span id="precio-total-valor"></span>


    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
