<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Sumador</title>
  </head>
  <body>
    <h1>Totalizador:</h1>
    <label>Cantidad de items: </label>
    <input type = "number" class="inp-cantItems"><br><br>
    <label>Precio del item: </label>
    <input type = "number" class="inp-priceItems"><br><br>
    <label>Peso volumetrico: </label>
    <input type = "number" class="inp-pesoVol"><br><br>
    <label>Estado: </label>
    <select class="select-estado">
      <option value="California">California (8.25%)</option>
      <option value="Alabama">Alabama (4%)</option>
      <option value="Texas">Texas (6.25%)</option>
      <option value="Nevada">Nevada (8.00%)</option>
      <option value="Utah">Utah (6.65%)</option>
    </select><br><br>
    <label>Categoria:</label>
    <select class="select-categoria">
      <option value="Varios"> Varios(impuesto:0% descuento:0%) </option>
      <option value="Alimentos"> Alimentos(impuesto:0% descuento:2%) </option>
      <option value="Bebidas"> Bebidas Alcoholicas(impuesto:7% descuento:0%) </option>
      <option value="MaterialEscritorio"> Material de Escritorio(impuesto:0% descuento:1.5%) </option>
      <option value="Muebles"> Muebles(impuesto:3% descuento:0%) </option>
      <option value="Electronicos"> Electronicos(impuesto:4% descuento:1%) </option>
      <option value="Vestimentas"> Muebles(impuesto:2% descuento:0%) </option>
    </select><br><br>
    <button class="btn-calcular">Totalizar</button><br><br>
    <label>Precio Neto : </label><span id="precio-neto-valor"></span><br><br>
    <label>Descuento(<span id="tasa-descuento"></span>): </label><span id="descuento"></span><br><br>
    <label>Descuento por categoria: </label><span id="descuento-cat"></span><br><br>
    <label>Impuesto: </label><span id="impuesto-valor"></span><br><br>
    <label>Costo de envio: </label><span id="costo-envio"></span><br><br>
    <label>Precio Total (+ impuesto): </label><span id="precio-total-valor"></span>


    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
